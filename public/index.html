<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>西安乔戈里科技有限公司实时产品报价</title>
    <meta name="description" content="西安乔戈里科技有限公司实时产品报价，联系华强 18609142259。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="西安乔戈里科技有限公司实时产品报价" />
    <meta property="og:description" content="全分类实时报价，联系华强 18609142259。" />
    <meta property="og:image" content="https://quote-mini-app.onrender.com/share-card.png" />
    <meta property="og:url" content="https://quote-mini-app.onrender.com/" />
    <link rel="icon" href="/share-card.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="报价工具栏">
        <div class="brand-row">
          <img class="brand-logo" src="/share-card.png" alt="西安乔戈里科技有限公司" />
          <div>
            <p class="eyebrow">西安乔戈里科技有限公司</p>
            <h1>实时产品报价</h1>
            <a class="contact" href="tel:18609142259">华强 18609142259</a>
          </div>
        </div>
        <div class="status">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">准备刷新</span>
        </div>
      </section>

      <section class="controls" aria-label="筛选和刷新">
        <label>
          <span>搜索</span>
          <input id="keywordInput" type="search" placeholder="型号、颜色、渠道、价格" autocomplete="off" />
        </label>
        <label>
          <span>刷新间隔</span>
          <select id="intervalSelect">
            <option value="10">10 秒</option>
            <option value="30" selected>30 秒</option>
            <option value="60">1 分钟</option>
            <option value="300">5 分钟</option>
          </select>
        </label>
        <button id="refreshButton" type="button">立即刷新</button>
        <button id="exportButton" type="button">导出 CSV</button>
      </section>

      <section class="category-panel" aria-label="分类筛选">
        <div class="category-head">
          <strong>分类</strong>
          <span id="categoryHint">正在读取分类...</span>
        </div>
        <label class="category-select-label">
          <span>选择品类</span>
          <select id="categorySelect">
            <option value="全部">全部</option>
          </select>
        </label>
        <div id="categoryList" class="category-list"></div>
      </section>

      <section class="summary" aria-label="报价摘要">
        <div>
          <span>商品数</span>
          <strong id="totalCount">0</strong>
        </div>
        <div>
          <span>最低价</span>
          <strong id="minPrice">-</strong>
        </div>
        <div>
          <span>最高价</span>
          <strong id="maxPrice">-</strong>
        </div>
        <div>
          <span>更新时间</span>
          <strong id="updatedAt">-</strong>
        </div>
      </section>

      <section class="table-wrap" aria-label="报价列表">
        <table>
          <thead>
            <tr>
              <th>分类</th>
              <th>商品</th>
              <th>报价</th>
              <th>变化</th>
            </tr>
          </thead>
          <tbody id="quoteBody">
            <tr>
              <td colspan="4" class="empty">正在读取报价...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
